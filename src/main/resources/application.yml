telegram:
  bot:
    token: ${TELEGRAM_BOT_TOKEN}
    username: ${TELEGRAM_BOT_USERNAME}

openai:
  api-key: ${OPENAI_API_KEY}
  model: ${OPENAI_MODEL:gpt-4.1}
  base-url: https://api.openai.com/v1
  max-tokens: 300

google:
  drive:
    credentials-path: ${GOOGLE_CREDENTIALS_PATH:classpath:google-oauth-credentials.json}
    tokens-path: ${GOOGLE_TOKENS_PATH:tokens}
    root-folder-name: sales
